---
# ============================================================================
# THE SHARED CONTRACT
# ----------------------------------------------------------------------------
# One source of truth for every brick. Real values, extracted from the
# sibling repos:
#   - arch-bootstrap        -> partlabel, mapper, subvolume, kernel
#   - arch-hypervisor-lab   -> vfio ids, domains, trust levels
# A brick consumes these variables; it never redefines them.
# ============================================================================

# --- Identity ---------------------------------------------------------------
admin_user: sid
host_hostname: hypervisor-01

# --- Boot / LUKS (must match what arch-bootstrap produced) -------------------
luks_partlabel: ARCH_ROOT
luks_root_device: /dev/disk/by-partlabel/ARCH_ROOT
luks_mapper_name: cryptroot
root_subvol: "@"
kernel_name: linux-hardened

# --- VFIO: RTX 3070 Mobile + its HDMI audio function -------------------------
vfio_ids: "10de:249d,10de:228b"

# --- The five domains (zones) -------------------------------------------------
# forward: nat      -> guests reach out through the host, nothing reaches in
# forward: isolated -> no <forward> element at all: bridge only, no way out
network_domains:
  - name: clean
    bridge: virbr-clean
    subnet: 10.10.1.0/24
    gateway: 10.10.1.1
    forward: nat
  - name: dirty
    bridge: virbr-dirty
    subnet: 10.10.2.0/24
    gateway: 10.10.2.1
    forward: nat
  - name: dev
    bridge: virbr-dev
    subnet: 10.10.3.0/24
    gateway: 10.10.3.1
    forward: nat
  - name: lab
    bridge: virbr-lab
    subnet: 10.10.4.0/24
    gateway: 10.10.4.1
    forward: isolated
  - name: services
    bridge: virbr-services
    subnet: 10.10.5.0/24
    gateway: 10.10.5.1
    forward: nat

# --- GPU rotation ------------------------------------------------------------
# ONLY these domains take part in the handoff protocol. Anything not listed
# here (service VMs) passes through the hook freely and never touches state.
gpu_trust_levels:
  clean: 3
  dev: 2
  dirty: 1
  lab: 0

# --- LAN exposure allowlist (DNAT) --------------------------------------------
# One entry per deliberate hole. Empty until the first service lands (A8).
# Shape:
#   - { name: jellyfin, proto: tcp, host_port: 8096,
#       guest: 10.10.5.10, guest_port: 8096 }
services_exposed: []
