# Managed by privatestack-ansible (roles/vfio_boot). Do not hand-edit:
# the next run overwrites this file - change the role instead.
#
# Early-bind: these modules ride in the initramfs and load before the kms
# drivers, so vfio-pci.ids (set only on the Vfio boot entry) claims both
# GPU functions - VGA and HDMI audio - before nouveau or snd_hda_intel.
# On every other profile vfio-pci loads with no ids and claims nothing.
MODULES+=(vfio_pci vfio vfio_iommu_type1)
