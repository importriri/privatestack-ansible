---
- name: Install nftables
  community.general.pacman:
    name: nftables
    state: present

- name: Own /etc/nftables.conf (include-only, never flush ruleset)
  ansible.builtin.copy:
    src: nftables.conf
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nftables

- name: Make the drop-in directory
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install the isolation matrix (validated by nft before landing)
  ansible.builtin.template:
    src: lab-isolation.nft.j2
    dest: /etc/nftables.d/lab-isolation.nft
    owner: root
    group: root
    mode: "0644"
    validate: nft -c -f %s
  notify: Reload nftables

- name: Enable and start nftables (reload-only from here on)
  ansible.builtin.systemd_service:
    name: nftables
    enabled: true
    state: started
