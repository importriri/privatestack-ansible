---
# The lab bundle: mounts the six bricks, in mandatory order.
# Bricks are uncommented as their stage lands - the shape is the plan.
- name: Assemble the hypervisor lab host
  hosts: hypervisor
  become: true
  roles:
    - base
    - kvm_host
    - vfio_boot
    - network_domains
