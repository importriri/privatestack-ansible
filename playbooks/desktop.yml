---
# The optional cockpit. Host and workstation VMs alike: the hypervisor
# rides its free iGPU (the dGPU belongs to gpu_handoff), guests their
# virtual one. lab.yml never mounts this - the blind host stays the
# default.
- name: Mount the desktop cockpit
  hosts: hypervisor:workstations
  become: true
  roles:
    - desktop
